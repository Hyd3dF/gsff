<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İz Admin Control Panel</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 100%);
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.35);
            --primary-hover: #2563eb;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --font: 'Outfit', sans-serif;
            --card-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font);
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 24px 40px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(17, 24, 39, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-container p {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* 2-Column Layout */
        .dashboard-container {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 32px;
            padding: 40px;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        @media (max-width: 1024px) {
            .dashboard-container {
                grid-template-columns: 1fr;
                padding: 20px;
                gap: 20px;
            }
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            gap: 24px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            box-shadow: 0 8px 32px 0 rgba(59, 130, 246, 0.05);
        }

        .card-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid rgba(59, 130, 246, 0.2);
            padding-bottom: 12px;
        }

        /* Forms */
        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .input-group input, .input-group textarea {
            background: rgba(31, 41, 55, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--text-main);
            font-family: var(--font);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: rgba(31, 41, 55, 0.8);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button.btn-primary {
            grid-column: span 2;
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            border: none;
            border-radius: 10px;
            padding: 14px;
            color: white;
            font-family: var(--font);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px var(--primary-glow);
        }

        button.btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
        }

        button.btn-primary:active {
            transform: translateY(0);
        }

        /* Items Lists */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 6px;
        }

        /* Custom scrollbar */
        .list-container::-webkit-scrollbar {
            width: 6px;
        }

        .list-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .list-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .list-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .list-item {
            background: rgba(31, 41, 55, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            transition: background 0.2s ease;
        }

        .list-item:hover {
            background: rgba(31, 41, 55, 0.5);
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item-title {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-main);
        }

        .item-desc {
            font-size: 13px;
            color: var(--text-muted);
        }

        .item-meta {
            font-size: 11px;
            color: rgba(156, 163, 175, 0.6);
            display: flex;
            gap: 10px;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: var(--font);
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .btn-delete:hover {
            background: var(--accent-red);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        /* API Key Specifics */
        .key-display {
            background: #1f2937;
            border: 1px dashed var(--primary);
            border-radius: 8px;
            padding: 10px 14px;
            font-family: monospace;
            font-size: 13px;
            color: #60a5fa;
            word-break: break-all;
            user-select: all;
            margin-top: 4px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--accent-green);
            color: white;
            padding: 14px 24px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(16, 185, 129, 0.3);
            font-weight: 600;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 10000;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1>📍 İz Admin Panel</h1>
            <p>Simple & Lightweight Mobile Map Server</p>
        </div>
    </header>

    <div class="dashboard-container">
        <!-- Marker Column -->
        <div class="glass-card">
            <div class="card-header">
                <h2>📍 Marker Management</h2>
            </div>
            
            <form id="marker-form" onsubmit="addMarker(event)">
                <div class="input-group">
                    <label for="latitude">Latitude</label>
                    <input type="number" id="latitude" step="any" placeholder="e.g. 41.0082" required>
                </div>
                <div class="input-group">
                    <label for="longitude">Longitude</label>
                    <input type="number" id="longitude" step="any" placeholder="e.g. 28.9784" required>
                </div>
                <div class="input-group full-width">
                    <label for="title">Location Title</label>
                    <input type="text" id="title" placeholder="e.g. Istanbul" required>
                </div>
                <div class="input-group full-width">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Describe this place..."></textarea>
                </div>
                <button type="submit" class="btn-primary">Add Location Marker</button>
            </form>

            <div class="list-container" id="markers-list">
                <!-- Loaded dynamically -->
            </div>
        </div>

        <!-- API Key Column -->
        <div class="glass-card">
            <div class="card-header">
                <h2>🔑 API Key Manager</h2>
            </div>

            <form id="key-form" onsubmit="generateKey(event)">
                <div class="input-group full-width">
                    <label for="key-desc">Key Description / Client Name</label>
                    <input type="text" id="key-desc" placeholder="e.g. iOS Client, Testing" required>
                </div>
                <button type="submit" class="btn-primary">Generate API Key</button>
            </form>

            <div class="list-container" id="keys-list">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Success!</div>

    <script>
        // Notification Helper
        function showToast(message, isSuccess = true) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.background = isSuccess ? 'var(--accent-green)' : 'var(--accent-red)';
            toast.style.boxShadow = isSuccess ? '0 8px 16px rgba(16, 185, 129, 0.3)' : '0 8px 16px rgba(239, 68, 68, 0.3)';
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Fetch Markers
        function loadMarkers() {
            fetch('/admin/markers')
                .then(res => res.json())
                .then(markers => {
                    const list = document.getElementById('markers-list');
                    list.innerHTML = '';
                    if (markers.length === 0) {
                        list.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding: 20px;">No markers saved yet.</div>';
                        return;
                    }
                    markers.forEach(m => {
                        const item = document.createElement('div');
                        item.className = 'list-item';
                        item.innerHTML = `
                            <div class="item-info">
                                <div class="item-title">${escapeHtml(m.title)}</div>
                                <div class="item-desc">${escapeHtml(m.description || 'No description')}</div>
                                <div class="item-meta">
                                    <span>Lat: ${m.latitude.toFixed(4)}</span>
                                    <span>Lng: ${m.longitude.toFixed(4)}</span>
                                </div>
                            </div>
                            <button class="btn-delete" onclick="deleteMarker(${m.id})">Delete</button>
                        `;
                        list.appendChild(item);
                    });
                })
                .catch(err => {
                    console.error(err);
                    showToast('Failed to load markers', false);
                });
        }

        // Add Marker
        function addMarker(event) {
            event.preventDefault();
            const data = {
                latitude: parseFloat(document.getElementById('latitude').value),
                longitude: parseFloat(document.getElementById('longitude').value),
                title: document.getElementById('title').value,
                description: document.getElementById('description').value
            };

            fetch('/admin/markers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => {
                if (res.success) {
                    showToast('Marker added successfully!');
                    document.getElementById('marker-form').reset();
                    loadMarkers();
                } else {
                    showToast(res.error || 'Failed to add marker', false);
                }
            })
            .catch(err => {
                console.error(err);
                showToast('Failed to add marker', false);
            });
        }

        // Delete Marker
        function deleteMarker(id) {
            if (!confirm('Are you sure you want to delete this marker?')) return;
            fetch(`/admin/markers/${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(res => {
                    if (res.success) {
                        showToast('Marker deleted');
                        loadMarkers();
                    }
                });
        }

        // Fetch API Keys
        function loadKeys() {
            fetch('/admin/api-keys')
                .then(res => res.json())
                .then(keys => {
                    const list = document.getElementById('keys-list');
                    list.innerHTML = '';
                    if (keys.length === 0) {
                        list.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding: 20px;">No API keys generated.</div>';
                        return;
                    }
                    keys.forEach(k => {
                        const item = document.createElement('div');
                        item.className = 'list-item';
                        item.innerHTML = `
                            <div class="item-info" style="flex: 1;">
                                <div class="item-title">${escapeHtml(k.description)}</div>
                                <div class="key-display">${escapeHtml(k.key)}</div>
                                <div class="item-meta">Created: ${new Date(k.created_at).toLocaleString()}</div>
                            </div>
                            <button class="btn-delete" onclick="deleteKey('${k.key}')">Revoke</button>
                        `;
                        list.appendChild(item);
                    });
                })
                .catch(err => {
                    console.error(err);
                    showToast('Failed to load API keys', false);
                });
        }

        // Generate API Key
        function generateKey(event) {
            event.preventDefault();
            const desc = document.getElementById('key-desc').value;

            fetch('/admin/api-keys', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ description: desc })
            })
            .then(res => res.json())
            .then(res => {
                if (res.success) {
                    showToast('New API key generated!');
                    document.getElementById('key-form').reset();
                    loadKeys();
                }
            })
            .catch(err => {
                console.error(err);
                showToast('Failed to generate key', false);
            });
        }

        // Delete API Key
        function deleteKey(key) {
            if (!confirm('Are you sure you want to revoke this API key? Client devices using this key will immediately lose access.')) return;
            fetch(`/admin/api-keys/${key}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(res => {
                    if (res.success) {
                        showToast('API Key revoked');
                        loadKeys();
                    }
                });
        }

        // Helper to escape HTML characters
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Initial Load
        window.onload = function() {
            loadMarkers();
            loadKeys();
        };
    </script>
</body>
</html>
