<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>İz Map</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body, #map {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Apple Maps Pin Style (SVG) */
        .apple-pin {
            width: 32px;
            height: 32px;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' width='32' height='32'><path d='M16 3C10.5 3 6 7.5 6 13c0 7.2 8.7 15.3 9.4 15.9.3.3.8.3 1.1 0 .8-.6 9.5-8.7 9.5-15.9 0-5.5-4.5-10-10-10z' fill='%23FF3B30' stroke='%23ffffff' stroke-width='2'/><circle cx='16' cy='13' r='5' fill='%23ffffff'/></svg>");
            background-size: contain;
            background-repeat: no-repeat;
            filter: drop-shadow(0px 3px 5px rgba(0, 0, 0, 0.25));
        }

        /* iOS User Location Blue Dot */
        .user-location-dot {
            width: 14px;
            height: 14px;
            background-color: #007AFF;
            border: 2.5px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0, 122, 255, 0.5);
            position: relative;
        }
        .user-location-pulse {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: rgba(0, 122, 255, 0.2);
            animation: user-pulse 2s infinite ease-out;
        }
        @keyframes user-pulse {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        /* Locate Button on bottom right (iOS style) */
        .locate-button {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 50%;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: transform 0.2s, background-color 0.2s;
        }
        .locate-button:active {
            transform: scale(0.92);
            background-color: #e5e5ea;
        }
        .locate-icon {
            width: 20px;
            height: 20px;
            fill: #007AFF;
        }

        /* iOS styled Leaflet popup */
        .leaflet-popup-content-wrapper {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 4px;
        }
        .leaflet-popup-tip {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: none;
        }
        .popup-card {
            padding: 6px 10px;
        }
        .popup-card h3 {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
            color: #1c1c1e;
        }
        .popup-card p {
            margin: 4px 0 0 0;
            font-size: 12px;
            color: #8e8e93;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="locate-button" onclick="locateUser()" title="Find current location">
        <svg class="locate-icon" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
        </svg>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        const apiKey = "{{ api_key }}";
        let map;
        let userLocationMarker = null;
        const activeMarkers = {};

        function initMap() {
            // Initialize Leaflet Map centered on Turkey by default
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([39.9334, 32.8597], 6);

            // Add Apple Maps style CartoDB Positron tile layer
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 20,
                subdomains: 'abcd'
            }).addTo(map);

            // Locate user on start
            map.locate({ setView: false, maxZoom: 14 });

            map.on('locationfound', onLocationFound);
            map.on('locationerror', onLocationError);

            // Fetch and draw markers
            fetchMarkers();
            // Poll for updates every 3 seconds
            setInterval(fetchMarkers, 3000);
        }

        function onLocationFound(e) {
            const latlng = e.latlng;
            if (userLocationMarker) {
                userLocationMarker.setLatLng(latlng);
            } else {
                const customIcon = L.divIcon({
                    className: 'user-icon-container',
                    html: '<div class="user-location-dot"><div class="user-location-pulse"></div></div>',
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });
                userLocationMarker = L.marker(latlng, { icon: customIcon }).addTo(map);
            }
            // Auto pan to user's location on initial load
            map.setView(latlng, 14);
        }

        function onLocationError(e) {
            console.log('Location not found: ' + e.message);
        }

        function locateUser() {
            if (map) {
                map.locate({ setView: true, maxZoom: 14 });
            }
        }

        function fetchMarkers() {
            fetch('/api/markers', {
                method: 'GET',
                headers: {
                    'X-API-Key': apiKey,
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                }
            })
            .then(res => {
                if (!res.ok) throw new Error('API key validation failed');
                return res.json();
            })
            .then(markers => {
                const currentKeys = new Set();
                
                markers.forEach(m => {
                    const key = `${m.coordinate.latitude.toFixed(6)}_${m.coordinate.longitude.toFixed(6)}`;
                    currentKeys.add(key);
                    
                    if (!activeMarkers[key]) {
                        const markerIcon = L.divIcon({
                            className: 'apple-pin-container',
                            html: '<div class="apple-pin"></div>',
                            iconSize: [32, 32],
                            iconAnchor: [16, 30]
                        });
                        
                        const leafletMarker = L.marker([m.coordinate.latitude, m.coordinate.longitude], { icon: markerIcon })
                            .bindPopup(`<div class="popup-card"><h3>${m.title}</h3><p>${m.description || ''}</p></div>`, {
                                closeButton: false,
                                offset: L.point(0, -22)
                            })
                            .addTo(map);
                        
                        activeMarkers[key] = leafletMarker;
                    } else {
                        activeMarkers[key].setPopupContent(`<div class="popup-card"><h3>${m.title}</h3><p>${m.description || ''}</p></div>`);
                    }
                });
                
                // Remove markers that are no longer in the DB
                Object.keys(activeMarkers).forEach(key => {
                    if (!currentKeys.has(key)) {
                        map.removeLayer(activeMarkers[key]);
                        delete activeMarkers[key];
                    }
                });
            })
            .catch(err => {
                console.error("Error loading markers:", err);
            });
        }

        window.onload = initMap;
    </script>
</body>
</html>
